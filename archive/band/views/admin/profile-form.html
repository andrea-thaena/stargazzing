<div class="admin-header">
  <h1 class="admin-title">{{formTitle}}</h1>
  <a href="/admin/profiles" class="btn btn-outline">Back</a>
</div>

<form method="POST" action="{{formAction}}" enctype="multipart/form-data" class="card" style="padding:1.5rem">
  <div class="form-group">
    <label>Name</label>
    <input type="text" name="name" class="form-control" required value="{{name}}">
  </div>
  <div class="form-group">
    <label>Instrument / Role</label>
    <input type="text" name="instrument" class="form-control" placeholder="Guitar, Drums, Vocals..." value="{{instrument}}">
  </div>
  <div class="form-group">
    <label>Bio</label>
    <textarea name="bio" class="form-control" rows="3">{{bio}}</textarea>
  </div>
  <div class="form-group">
    <label>Photo</label>
    <input type="file" name="photo" class="form-control" accept="image/*">
  </div>
  <div class="form-group">
    <label>Display Order</label>
    <input type="number" name="display_order" class="form-control" value="{{displayOrder}}">
  </div>
  <button type="submit" class="btn btn-pink">Save</button>
</form>

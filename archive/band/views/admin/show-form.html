<div class="admin-header">
  <h1 class="admin-title">{{formTitle}}</h1>
  <a href="/admin/shows" class="btn btn-outline">Back</a>
</div>

<form method="POST" action="{{formAction}}" class="card" style="padding:1.5rem">
  <div class="form-group">
    <label>Date</label>
    <input type="date" name="date" class="form-control" value="{{date}}" required>
  </div>
  <div class="form-group">
    <label>Time</label>
    <input type="text" name="time" class="form-control" placeholder="7:00 PM" value="{{time}}">
  </div>
  <div class="form-group">
    <label>Venue / Event Name</label>
    <input type="text" name="venue" class="form-control" required value="{{venue}}">
  </div>
  <div class="form-group">
    <label>Location</label>
    <input type="text" name="location" class="form-control" placeholder="City, State" value="{{location}}">
  </div>
  <div class="form-group">
    <label>Description / Notes</label>
    <textarea name="description" class="form-control" rows="3">{{description}}</textarea>
  </div>
  <button type="submit" class="btn btn-pink">Save Show</button>
</form>

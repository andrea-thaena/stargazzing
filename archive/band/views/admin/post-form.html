<div class="admin-header">
  <h1 class="admin-title">{{formTitle}}</h1>
  <a href="/admin" class="btn btn-outline">Back</a>
</div>

<form method="POST" action="{{formAction}}" enctype="multipart/form-data" class="card" style="padding:1.5rem">
  <div class="form-group">
    <label>Post Type</label>
    <select name="post_type" class="form-control">
      <option value="text" {{postTypeText}}>Text</option>
      <option value="music" {{postTypeMusic}}>Music</option>
      <option value="art" {{postTypeArt}}>Art</option>
      <option value="video" {{postTypeVideo}}>Video</option>
      <option value="link" {{postTypeLink}}>Link</option>
    </select>
  </div>

  <div class="form-group">
    <label>Body (Markdown supported)</label>
    <textarea name="body" class="form-control" rows="6">{{body}}</textarea>
  </div>

  <div class="form-group">
    <label>Upload Media (image, audio, or video)</label>
    <input type="file" name="media" class="form-control" accept="image/*,audio/*,video/*">
  </div>

  <div class="form-group">
    <label>OR Embed URL (Spotify, YouTube, Bandcamp, Vimeo, TikTok)</label>
    <input type="url" name="embed_url" class="form-control" placeholder="https://..." value="{{mediaUrl}}">
  </div>

  <div class="form-group">
    <label>Tags (comma-separated)</label>
    <input type="text" name="tags" class="form-control" placeholder="punk, space, demo" value="{{tags}}">
  </div>

  <button type="submit" class="btn btn-pink">Save Post</button>
</form>

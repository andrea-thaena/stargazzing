<div class="admin-header">
  <h1 class="admin-title">Upload to Gallery</h1>
  <a href="/admin/gallery" class="btn btn-outline">Back</a>
</div>

<form method="POST" action="/admin/gallery" enctype="multipart/form-data" class="card" style="padding:1.5rem">
  <div class="form-group">
    <label>Photo or Video</label>
    <input type="file" name="file" class="form-control" accept="image/*,video/*" required>
  </div>
  <div class="form-group">
    <label>Caption</label>
    <input type="text" name="caption" class="form-control" placeholder="What's in this photo?">
  </div>
  <div class="form-group">
    <label>Date</label>
    <input type="date" name="date" class="form-control">
  </div>
  <button type="submit" class="btn btn-pink">Upload</button>
</form>

<div class="admin-header">
  <h1 class="admin-title">Edit About Page</h1>
</div>

<form method="POST" action="/admin/about" class="card" style="padding:1.5rem">
  <div class="form-group">
    <label>Band Bio (Markdown supported)</label>
    <textarea name="bio" class="form-control" rows="10">{{bio}}</textarea>
  </div>
  <button type="submit" class="btn btn-pink">Save</button>
</form>

<p class="text-muted" style="margin-top:1rem">
  Manage band member profiles on the <a href="/admin/profiles">Profiles page</a>.
</p>
